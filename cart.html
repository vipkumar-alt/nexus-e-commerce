<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Nexus</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
   
    <header class="navbar">
      <div class="navbar__container">
        <div class="navbar__logo">
          <span class="logo-text">NEXUS</span>
        </div>

        <nav class="navbar__links">
          <a href="index.html">Catalog</a>
          <a href="index.html#new-arrivals">New Arrivals</a>
          <a href="index.html#deals">Deals</a>
          <a href="index.html#contact">Contact</a>
        </nav>

        <div class="navbar__actions">
          <input type="text" placeholder="Search..." class="search-input" />
          <a href="profile.html" class="icon user" aria-label="Profile"></a>
          <a href="cart.html" class="icon cart" aria-label="Cart">
            <span class="cart-count">0</span>
          </a>
        </div>

        <button class="navbar__toggle" aria-label="Toggle menu">
          <span class="hamburger"></span>
        </button>
      </div>
    </header>

    <main class="cart-page">
      <section class="cart-hero">
        <h1>Your Cart</h1>
        <p class="muted">Review items in your cart and proceed to checkout.</p>
      </section>

      <section class="cart-content">
        <p>Your cart is empty.</p>
        <a href="index.html" class="btn btn--primary">Browse Catalog</a>
      </section>
    </main>
  </body>
</html>
